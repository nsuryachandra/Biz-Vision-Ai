<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_23 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_23" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_23');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(width, height);
container.appendChild(renderer.domElement);

// Create a "Startup Crystal" - a complex geometric shape
const group = new THREE.Group();
scene.add(group);

const coreGeometry = new THREE.IcosahedronGeometry(1.5, 0);
const coreMaterial = new THREE.MeshPhongMaterial({
  color: 0x4d44e3,
  emissive: 0x2d1b69,
  shininess: 100,
  flatShading: true,
  transparent: true,
  opacity: 0.9
});
const core = new THREE.Mesh(coreGeometry, coreMaterial);
group.add(core);

// Wireframe shell
const wireGeometry = new THREE.IcosahedronGeometry(1.8, 1);
const wireMaterial = new THREE.MeshBasicMaterial({
  color: 0x4d44e3,
  wireframe: true,
  transparent: true,
  opacity: 0.2
});
const wireframe = new THREE.Mesh(wireGeometry, wireMaterial);
group.add(wireframe);

// Floating particles around the crystal
const particlesCount = 50;
const particlesGeometry = new THREE.BufferGeometry();
const posArray = new Float32Array(particlesCount * 3);

for(let i = 0; i < particlesCount * 3; i++) {
    posArray[i] = (Math.random() - 0.5) * 10;
}

particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const particlesMaterial = new THREE.PointsMaterial({
    size: 0.05,
    color: 0x4d44e3,
    transparent: true,
    opacity: 0.8
});
const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particlesMesh);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 1);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

const blueLight = new THREE.PointLight(0x4d44e3, 2);
blueLight.position.set(-5, -5, 2);
scene.add(blueLight);

// Interaction
let mouseX = 0;
let mouseY = 0;
let targetX = 0;
let targetY = 0;

window.addEventListener('mousemove', (event) => {
    mouseX = (event.clientX / window.innerWidth) - 0.5;
    mouseY = (event.clientY / window.innerHeight) - 0.5;
});

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

function animate() {
    requestAnimationFrame(animate);
    
    targetX = mouseX * 0.5;
    targetY = mouseY * 0.5;
    
    group.rotation.y += 0.005 + (targetX - group.rotation.y) * 0.1;
    group.rotation.x += 0.005 + (targetY - group.rotation.x) * 0.1;
    
    wireframe.rotation.y -= 0.002;
    particlesMesh.rotation.y += 0.001;
    
    renderer.render(scene, camera);
}

animate();

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_23 -->
</body>
</html>
